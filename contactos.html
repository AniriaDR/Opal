<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Opal</title>
    <link rel="stylesheet" href="css/contacto.css">
</head>
<body>

    <header>
        <div class="logo">
            <h1>Opal</h1>
        </div>
        <nav class="navbar">
            <a href="#">Inicio</a>
            <a href="#">Menú</a>
            <a href="#">Reservar</a>
            <a href="#">Mis Reservaciones</a>
            <a href="#">Contacto</a>
        </nav>
    </header>

    <main>
        <h2>Contacto.</h2>
        
        <div class="info">
            <div class="address">
                <h4>Dirección.</h4>
                <p><strong>Dirección:</strong> 123 Avenida del Gourmet, Ciudad del Lujo, 45678</p>
                <div class="map">
                    <img src="img/mapa.png" alt="Mapa de ubicación">
                </div>
            </div>
            <div class="phone">
                <h4>Teléfono.</h4>
                <p>+1 (555) 987-6543</p>
            </div>
        </div>
    </main>

    <footer>
        <div class="social-icons">
            <a href="#"><img src="facebook.png" alt="Facebook"></a>
            <a href="#"><img src="twitter.png" alt="Twitter"></a>
            <a href="#"><img src="instagram.png" alt="Instagram"></a>
            <a href="#"><img src="youtube.png" alt="YouTube"></a>
        </div>
        <p>© 2024 Opal. All rights reserved</p>
    </footer>

</body>
</html>
